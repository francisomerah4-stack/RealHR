 <!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>ConvoX — Student Join</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  body{background:#000;color:#fff;font-family:Inter,Arial;padding:16px}
  .card{max-width:720px;margin:28px auto;background:rgba(255,255,255,0.05);
        backdrop-filter:blur(15px);padding:18px;border-radius:18px}
  input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;
        background:rgba(255,255,255,0.08);color:#fff}
  button{padding:12px;border-radius:10px;border:none;background:#00b7ff;
         color:#000;font-weight:700;cursor:pointer;width:100%}
  .info{color:#bbb;font-size:13px;margin-top:8px}
  .ok{display:none;background:rgba(0,200,0,0.1);padding:12px;border-radius:12px;margin-top:12px}
</style>
</head>
<body>

<div class="card">
  <h3>Join Class</h3>
  <input id="name" placeholder="Full name">
  <input id="matric" placeholder="Matric number">
  <input id="code" placeholder="Class code (6 digits)">
  <button id="join">Find & Join</button>
  <p id="status" class="info"></p>

  <div id="ok" class="ok">
    <h4>✅ Joined Successfully</h4>
    <div id="details"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getDatabase, ref, onValue, get, push, set, update } 
  from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

/* 🔥 SAME FIREBASE CONFIG AS LECTURER PAGE */
const firebaseConfig = {
  apiKey: "AIzaSyBXtgGC8uhTNZag5-hV9cg2_Bs6FpWNb14",
  authDomain: "convox-cdriod1.firebaseapp.com",
  databaseURL: "https://convox-cdriod1-default-rtdb.firebaseio.com",
  projectId: "convox-cdriod1",
  storageBucket: "convox-cdriod1.appspot.com",
  messagingSenderId: "1005902587536",
  appId: "1:1005902587536:web:d5ea4f3cf03ebf25e31a15"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const status = document.getElementById("status");

/* 🔐 DEVICE LOCK (ONE PHONE ONLY) */
let deviceId = localStorage.getItem("convox_device");
if(!deviceId){
  deviceId = crypto.randomUUID();
  localStorage.setItem("convox_device", deviceId);
}

document.getElementById("join").onclick = async () => {
  const name = document.getElementById("name").value.trim();
  const matric = document.getElementById("matric").value.trim();
  const code = document.getElementById("code").value.trim();

  if(!name || !matric || !code){
    alert("Fill all fields");
    return;
  }

  status.textContent = "Searching active lecture...";

  /* 🔍 REAL-TIME SESSION SEARCH */
  const sessionsRef = ref(db, "attendance/sessions");

  onValue(sessionsRef, snap => {
    if(!snap.exists()){
      alert("No active sessions");
      status.textContent="";
      return;
    }

    let sessionId = null;
    let sessionData = null;

    snap.forEach(s=>{
      const v = s.val();
      if(String(v.code)===String(code) && v.expiresAt >= Date.now()){
        sessionId = s.key;
        sessionData = v;
      }
    });

    if(!sessionId){
      alert("Invalid or expired code");
      status.textContent="";
      return;
    }

    joinSession(sessionId, sessionData);
  }, { onlyOnce:true });
};

/* ✅ JOIN VERIFIED SESSION */
async function joinSession(sessionId, sessionData){

  const deviceRef = ref(db, 
    `attendance/sessions/${sessionId}/devices/${deviceId}`
  );

  const deviceSnap = await get(deviceRef);
  if(deviceSnap.exists()){
    alert("This phone has already joined this class");
    status.textContent="";
    return;
  }

  if(!navigator.geolocation){
    alert("Location required");
    status.textContent="";
    return;
  }

  status.textContent = "Verifying your location...";

  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const distance = haversine(
      lat, lon, sessionData.lat, sessionData.lon
    );

    if(distance > Number(sessionData.range || 50)){
      alert("Outside class range ("+Math.round(distance)+"m)");
      status.textContent="";
      return;
    }

    /* ✅ SAVE STUDENT (LECTURER SEES IN REAL TIME) */
    const studentRef = push(
      ref(db, `attendance/sessions/${sessionId}/students`)
    );

    await set(studentRef, {
      name,
      matric,
      lat,
      lon,
      distance: Math.round(distance),
      time: new Date().toLocaleString(),
      deviceId
    });

    await set(deviceRef, { joinedAt: Date.now() });
    await update(ref(db, `attendance/sessions/${sessionId}`), {
      lastJoin: Date.now()
    });

    document.getElementById("ok").style.display="block";
    document.getElementById("details").innerHTML =
      `Name: <b>${name}</b><br>
       Matric: <b>${matric}</b><br>
       Course: <b>${sessionData.course}</b>`;

    status.textContent="";
  }, ()=>{
    alert("Allow location access");
    status.textContent="";
  }, { enableHighAccuracy:true, timeout:15000 });
}

/* 📐 DISTANCE CALCULATION */
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = v => v*Math.PI/180;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLon/2)**2;
  return R * (2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
</script>

</body>
</html>
