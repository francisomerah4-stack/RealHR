<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>ConvoX</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    :root{--card:rgba(255,255,255,0.04);}
    .card{width:92%;max-width:520px;padding:36px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));box-shadow:0 10px 40px rgba(0,0,0,0.6);backdrop-filter:blur(10px)}
    body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#050406;font-family:Inter,Arial;color:#fff}
    .logo{font-size:46px;font-weight:800;text-align:center;margin-bottom:6px}
    .field{width:100%;padding:12px;border-radius:10px;border:none;margin:10px 0;background:rgba(255,255,255,0.03);color:#fff}
    .row{display:flex;gap:10px}
    .btn{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-weight:700}
    .btn-lect{background:linear-gradient(90deg,#4ee7ff,#2ee7a6);color:#000}
    .btn-stud{background:linear-gradient(90deg,#ffd28a,#ff6b6b);color:#000}
    .by{margin-top:26px;text-align:center;color:#bbb}
    .sweep{display:inline-block;background:linear-gradient(90deg,#ccc,#fff,#ccc);background-size:200%;-webkit-background-clip:text;color:transparent;animation:shine 2.6s linear infinite}
    @keyframes shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ConvoX</div>
    <div style="text-align:center;color:#ddd;margin-bottom:8px">Attendance • Chat • Status</div>
    <input id="course" class="field" placeholder="Course (optional) e.g. GST 111">
    <div class="row">
      <button class="btn btn-lect" id="lectBtn">Lecturer</button>
      <button class="btn btn-stud" id="studBtn">Student</button>
    </div>
    <div style="text-align:center;color:#bbb;margin-top:16px;font-size:13px">Lecturer generates a session code; Students join with the code.</div>
    <div class="by">Powered by <span class="sweep">OMERAH</span></div>
  </div>

  <script>
    document.getElementById('lectBtn').addEventListener('click', ()=>{
      const c = encodeURIComponent(document.getElementById('course').value || '');
      location.href = 'lecturer.html' + (c ? ('?course=' + c) : '');
    });
    document.getElementById('studBtn').addEventListener('click', ()=> location.href='student.html');
  </script>
</body>
</html>
